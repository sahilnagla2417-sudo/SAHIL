<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Zandu Engineers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact">
  <div id="loader" class="loader"><div class="loader-dot"></div></div><div id="site-header" class="topbar-holder"></div>
  <section class="banner"><div class="container"><h1>Contact Us</h1><p>Talk to our experts for machinery consultation and support.</p></div></section>
  <section class="section">
    <div class="container contact-grid">
      <div class="card">
        <h3>Send a Message</h3>
        <form>
          <input style="width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;margin-bottom:9px;" placeholder="Full Name">
          <input style="width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;margin-bottom:9px;" placeholder="Email">
          <input style="width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;margin-bottom:9px;" placeholder="Phone">
          <textarea style="width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;margin-bottom:9px;" rows="4" placeholder="Message"></textarea>
          <button class="btn btn-primary">Submit</button>
        </form>
      </div>
      <div>
        <div class="grid-3">
          <div class="card"><h4>Email</h4><p>support@zanduengineers.com</p></div>
          <div class="card"><h4>Phone</h4><p>+91 22 4012 9988</p></div>
          <div class="card"><h4>Office</h4><p>Pune Industrial Zone, India</p></div>
        </div>
        <div class="map-wrap" style="margin-top:16px;">
          <iframe title="Map" src="https://www.google.com/maps?q=Pune%20India&output=embed"></iframe>
        </div>
      </div>
    </div>
  </section>
  <a class="whatsapp-float" href="#">WhatsApp Support</a>
  <div id="site-footer"></div><button id="scrollTop" class="scroll-top">↑</button>
  <script src="https://unpkg.com/lucide@latest"></script><script src="script.js"></script>
</body>
</html>
